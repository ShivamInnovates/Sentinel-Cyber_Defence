# ========================================================================================
# TRINETRA Cyber Defense - Production Docker Compose Override
# ========================================================================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml \
#        --env-file .env.prod up -d
#
# This file overrides settings from docker-compose.yml for production deployment

version: '3.9'

services:
  redis:
    # Production: Always restart on failure
    restart: always
    
    # Production: Limit resources
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    
    # Production: Enable persistence
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  backend:
    # Production: Always restart on failure
    restart: always
    
    # Production: No hot reload, optimized for performance
    command: >
      gunicorn
      -w 4
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --access-logfile -
      --error-logfile -
      --timeout 30
      app:app
    
    # Production: Limit resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Production: Use only essential volumes
    volumes:
      - ./backend/data:/app/data:ro
      - ./backend/logs:/app/logs:rw
    
    environment:
      # Override with production settings
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: WARNING

  frontend:
    # Production: Always restart on failure
    restart: always
    
    # Production: Enable gzip compression and caching
    environment:
      # Nginx will cache static assets for 1 year
      NGINX_CACHE_CONTROL: "public, max-age=31536000"
    
    # Production: Limit resources
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# ────────────────────────────────────────────────────────────────────────────────────────
# Production Network Configuration
# ────────────────────────────────────────────────────────────────────────────────────────
networks:
  trinetra-network:
    driver: bridge
    driver_opts:
      # Enable IPv6 (optional)
      # com.docker.network.driver.mtu: 1500
      pass
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
