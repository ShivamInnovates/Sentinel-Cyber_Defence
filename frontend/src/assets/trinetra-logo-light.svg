<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="52" stroke="url(#gradL1)" stroke-width="2.5" fill="none"/>
  
  <!-- Top eye -->
  <ellipse cx="60" cy="36" rx="18" ry="10" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
  <path d="M42 36 Q60 22 78 36" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
  <circle cx="60" cy="36" r="5" fill="url(#gradL2)"/>
  <circle cx="60" cy="36" r="2.5" fill="#0ea5e9"/>

  <!-- Bottom-left eye -->
  <g transform="rotate(120 60 60)">
    <ellipse cx="60" cy="36" rx="18" ry="10" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
    <path d="M42 36 Q60 22 78 36" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
    <circle cx="60" cy="36" r="5" fill="url(#gradL2)"/>
    <circle cx="60" cy="36" r="2.5" fill="#0ea5e9"/>
  </g>

  <!-- Bottom-right eye -->
  <g transform="rotate(240 60 60)">
    <ellipse cx="60" cy="36" rx="18" ry="10" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
    <path d="M42 36 Q60 22 78 36" stroke="url(#gradL1)" stroke-width="2" fill="none"/>
    <circle cx="60" cy="36" r="5" fill="url(#gradL2)"/>
    <circle cx="60" cy="36" r="2.5" fill="#0ea5e9"/>
  </g>

  <defs>
    <linearGradient id="gradL1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="gradL2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
  </defs>
</svg>
